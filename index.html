<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hasta Prensesin Aşık Prensi</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#1a0026;
--bg2:#000000;
--purple:#8000ff;
--magenta:#ff00ff;
--paper:#f5e6c8;
--gold1:gold;
--gold2:#c9a86a;
--frame:#b8965a;
}

body{
margin:0;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at center,var(--bg1),var(--bg2));
font-family:'Cinzel',serif;
}

/* Fog */
.fog{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(rgba(255,255,255,0.04),transparent 70%);
animation:fogMove 40s linear infinite;
pointer-events:none;
z-index:1;
}
@keyframes fogMove{
from{transform:translate(-20%,-20%)}
to{transform:translate(0,0)}
}

/* Mouse light */
.light{
position:fixed;
width:320px;
height:320px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle,rgba(255,0,255,0.25),transparent 70%);
transform:translate(-50%,-50%);
z-index:2;
mix-blend-mode:screen;
}

/* START */
#startScreen{
position:relative;
z-index:5;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
color:white;
}

h1{
font-family:'Great Vibes',cursive;
font-size:48px;
margin:0 0 18px 0;
}

.book{
width:300px;
height:400px;
perspective:1200px;
}
.cover{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 2s;
}
.cover.open{
transform:rotateY(-160deg);
}
.front{
position:absolute;
width:100%;
height:100%;
background:url('kapak.png') center/cover no-repeat;
border-radius:10px;
box-shadow:0 0 40px rgba(179,0,255,.85);
backface-visibility:hidden;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,var(--purple),var(--magenta));
color:white;
cursor:pointer;
box-shadow:0 0 18px rgba(179,0,255,.6);
}

#bookContainer{
position:relative;
z-index:6;
display:none;
justify-content:center;
align-items:center;
height:100vh;
perspective:2000px;
}

.bookStage{
position:relative;
width:740px;
height:540px;
transform: translateZ(120px);
}

.page{
position:absolute;
inset:0;
width:740px;
height:540px;
background:var(--paper);
border:8px solid transparent;
border-image:linear-gradient(45deg,var(--gold1),var(--gold2),var(--gold1)) 1;
padding:22px;
box-sizing:border-box;
color:#2b1a00;
opacity:0;
pointer-events:none;
transform-origin:left center;
transform:rotateY(92deg);
transition:transform .85s ease, opacity .4s ease;
backface-visibility:hidden;
box-shadow: inset 0 0 60px rgba(0,0,0,.18);
}

.page.active{
opacity:1;
pointer-events:auto;
transform:rotateY(0deg);
z-index:5;
}

.page.turning{
transform:rotateY(-115deg);
opacity:0;
}

.imageFrame{
width:100%;
height:66%;
display:flex;
justify-content:center;
align-items:center;
background:#e8d7b5;
border:12px solid var(--frame);
border-radius:8px;
box-shadow:inset 0 0 26px rgba(0,0,0,.35),0 14px 30px rgba(0,0,0,.45);
overflow:hidden;
}

.imageFrame img{
max-width:92%;
max-height:92%;
object-fit:contain;
display:block;
}

/* ✅ SADECE BURASI DEĞİŞTİ */
.text{
margin-top:12px;
font-family:'Great Vibes',cursive;
font-weight:bold;
font-style:italic;
font-size:26px;
text-align:center;
user-select:none;

/* NETLEŞTİRME */
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
text-rendering: geometricPrecision;

/* MOR GAMMA IŞIK */
color:#2b1a00;
text-shadow:
0 0 6px rgba(179,0,255,0.35),
0 0 14px rgba(179,0,255,0.28),
0 0 26px rgba(179,0,255,0.22),
0 2px 0 rgba(0,0,0,0.12);
}

.nextBtn{
position:absolute;
bottom:16px;
right:18px;
padding:9px 18px;
background:rgba(128,0,255,.92);
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

#finalPopup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.88);
display:none;
justify-content:center;
align-items:center;
color:white;
text-align:center;
z-index:20;
}

</style>
</head>
<body>

<div class="fog"></div>
<div class="light" id="light"></div>

<div id="startScreen">
<h1>Kurtarılmayı Bekleyen Prenses</h1>
<div class="book">
<div class="cover" id="cover">
<div class="front"></div>
</div>
</div>
<button onclick="startReading()">Okumaya Başla</button>
</div>

<div id="bookContainer">
<div class="bookStage">

<div class="page active">
<div class="imageFrame"><img src="resim1.png"></div>
<div class="text">Masalın ilk satırı burada başlar...</div>
<button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
</div>

<div class="page">
<div class="imageFrame"><img src="resim2.png"></div>
<div class="text">Aşk uzak diyarlarda yankılandı...</div>
<button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
</div>

<div class="page">
<div class="imageFrame"><img src="resim3.png"></div>
<div class="text">Kalpler aynı kaderde buluştu...</div>
<button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
</div>

<div class="page">
<div class="imageFrame"><img src="resim4.png"></div>
<div class="text">Her sayfa yeni bir umut taşıdı...</div>
<button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
</div>

<div class="page">
<div class="imageFrame"><img src="resim5.png"></div>
<div class="text">Masal sonsuza dek sürdü...</div>
<button class="nextBtn" onclick="finishStory()">Son →</button>
</div>

</div>
</div>

<audio id="bgMusic" src="evşann.mp3" loop></audio>
<audio id="paperSound" src="paper.mp3"></audio>

<script>
let current=0;
const pages=document.querySelectorAll('.page');

function startReading(){
document.getElementById('cover').classList.add('open');
setTimeout(()=>{
document.getElementById('startScreen').style.display='none';
document.getElementById('bookContainer').style.display='flex';
document.getElementById('bgMusic').play();
},1800);
}

function nextPage(){
document.getElementById('paperSound').currentTime=0;
document.getElementById('paperSound').play();
pages[current].classList.add('turning');
setTimeout(()=>{
pages[current].classList.remove('active','turning');
current++;
pages[current].classList.add('active');
},850);
}
</script>

</body>
</html>
