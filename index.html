<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hasta Prensesin Aşık Prensi</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#1a0026;
    --bg2:#000000;
    --purple:#8000ff;
    --magenta:#ff00ff;
    --paper:#f5e6c8;
    --gold1:gold;
    --gold2:#c9a86a;
    --frame:#b8965a;
  }

  body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:radial-gradient(circle at center,var(--bg1),var(--bg2));
    font-family:'Cinzel',serif;
  }

  /* Fog */
  .fog{
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(rgba(255,255,255,0.04),transparent 70%);
    animation:fogMove 40s linear infinite;
    pointer-events:none;
    z-index:1;
  }
  @keyframes fogMove{
    from{transform:translate(-20%,-20%)}
    to{transform:translate(0,0)}
  }

  /* Mouse light */
  .light{
    position:fixed;
    width:320px;
    height:320px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle,rgba(255,0,255,0.25),transparent 70%);
    transform:translate(-50%,-50%);
    z-index:2;
    mix-blend-mode:screen;
  }

  /* Candle */
  .candle{
    position:fixed;
    top:18px;
    right:24px;
    width:40px;
    height:86px;
    background:#eee;
    border-radius:8px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
    z-index:3;
  }
  .candle::before{
    content:"";
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    width:6px;
    height:14px;
    background:#333;
    border-radius:3px;
    opacity:.6;
  }
  .candle::after{
    content:"";
    position:absolute;
    top:-32px;
    left:50%;
    transform:translateX(-50%);
    width:26px;
    height:38px;
    border-radius:50%;
    background:radial-gradient(circle at 45% 40%, #fff1a8 0%, #ffb347 25%, rgba(255,140,0,0.0) 70%);
    filter:blur(.2px);
    animation:flicker .18s infinite alternate;
  }
  @keyframes flicker{
    from{opacity:.65; transform:translateX(-50%) scale(1) rotate(-2deg)}
    to{opacity:1; transform:translateX(-50%) scale(1.08) rotate(2deg)}
  }

  /* 3D table (book on desk feel) */
  .table3d{
    position:fixed;
    bottom:-140px;
    left:50%;
    transform:translateX(-50%) rotateX(72deg);
    width:1300px;
    height:420px;
    background:radial-gradient(circle at 40% 30%, #4a341f, #1a120a 70%);
    box-shadow:0 -40px 130px rgba(0,0,0,.85) inset;
    z-index:0;
  }

  /* START */
  #startScreen{
    position:relative;
    z-index:5;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    text-align:center;
    color:white;
  }

  h1{
    font-family:'Great Vibes',cursive;
    font-size:48px;
    margin:0 0 18px 0;
  }

  /* BOOK COVER */
  .book{
    width:300px;
    height:400px;
    perspective:1200px;
  }
  .cover{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 2s;
  }
  .cover.open{
    transform:rotateY(-160deg);
  }
  .front{
    position:absolute;
    width:100%;
    height:100%;
    background:url('kapak.png') center/cover no-repeat;
    border-radius:10px;
    box-shadow:0 0 40px rgba(179,0,255,.85);
    backface-visibility:hidden;
  }

  /* BUTTON */
  button{
    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,var(--purple),var(--magenta));
    color:white;
    cursor:pointer;
    box-shadow:0 0 18px rgba(179,0,255,.6);
  }

  /* BOOK AREA */
  #bookContainer{
    position:relative;
    z-index:6;
    display:none;
    justify-content:center;
    align-items:center;
    height:100vh;
    perspective:2000px;
  }

  /* Holder keeps pages stacked */
  .bookStage{
    position:relative;
    width:740px;
    height:540px;
    transform: translateZ(120px) rotateX(2deg);
    filter: drop-shadow(0 26px 45px rgba(0,0,0,.65));
  }

  /* shadow under book */
  .bookStage::before{
    content:"";
    position:absolute;
    left:50%;
    top:70%;
    transform:translateX(-50%);
    width:900px;
    height:360px;
    background:radial-gradient(ellipse, rgba(0,0,0,.65), transparent 70%);
    filter:blur(26px);
    z-index:-1;
  }

  /* PAGE */
  .page{
    position:absolute;
    inset:0;
    width:740px;
    height:540px;

    background:var(--paper);
    border:8px solid transparent;
    border-image:linear-gradient(45deg,var(--gold1),var(--gold2),var(--gold1)) 1;

    padding:22px 22px 18px 22px;
    box-sizing:border-box;
    color:#2b1a00;

    display:block;              /* stack pages */
    opacity:0;
    pointer-events:none;

    transform-origin:left center;
    transform:rotateY(92deg);
    transition:transform .85s ease, opacity .4s ease;
    backface-visibility:hidden;

    /* aged feel */
    box-shadow: inset 0 0 60px rgba(0,0,0,.18);
  }

  .page.active{
    opacity:1;
    pointer-events:auto;
    transform:rotateY(0deg);
    z-index:5;
  }

  /* paper edge shadow (always) */
  .page::after{
    content:"";
    position:absolute;
    top:0;
    right:0;
    width:70px;
    height:100%;
    background:linear-gradient(to left, rgba(0,0,0,.22), transparent);
    pointer-events:none;
  }

  /* turn animation (on click) */
  .page.turning{
    transform:rotateY(-115deg);
    opacity:0;
  }

  /* IMAGE FRAME (real frame so it never spills) */
  .imageFrame{
    width:100%;
    height:66%;
    display:flex;
    justify-content:center;
    align-items:center;

    background:#e8d7b5;
    border:12px solid var(--frame);
    border-top-color:#caa56a;
    border-left-color:#b1894f;

    border-radius:8px;
    box-shadow:
      inset 0 0 26px rgba(0,0,0,.35),
      0 14px 30px rgba(0,0,0,.45);

    overflow:hidden;
  }

  /* THE IMAGE WILL NEVER OVERFLOW */
  .imageFrame img{
    max-width:92%;
    max-height:92%;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
    border:2px solid rgba(0,0,0,.12);
    box-shadow:0 10px 20px rgba(0,0,0,.25);
  }

  .text{
    margin-top:12px;
    font-family:'Great Vibes',cursive;
    font-weight:bold;
    font-style:italic;
    font-size:26px;
    text-align:center;
    user-select:none;
  }

  .nextBtn{
    position:absolute;
    bottom:16px;
    right:18px;
    padding:9px 18px;
    background:rgba(128,0,255,.92);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 0 16px rgba(179,0,255,.5);
  }

  /* FINAL POPUP */
  #finalPopup{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.88);
    display:none;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
    z-index:20;
    padding:24px;
    box-sizing:border-box;
  }
  .popupInner{
    max-width:900px;
    border:2px solid rgba(201,168,106,.55);
    border-radius:18px;
    padding:26px 22px;
    box-shadow:0 0 40px rgba(179,0,255,.25);
    background:radial-gradient(circle at 50% 30%, rgba(128,0,255,.18), rgba(0,0,0,.2));
  }
  .popupTitle{
    font-family:'Great Vibes',cursive;
    font-size:52px;
    font-weight:bold;
    font-style:italic;
    margin-bottom:10px;
  }
  .popupText{
    font-family:'Great Vibes',cursive;
    font-size:34px;
    font-weight:bold;
    font-style:italic;
    opacity:.95;
  }

  /* Responsive */
  @media (max-width:820px){
    .bookStage, .page{ width:92vw; height:64vh; }
    .bookStage::before{ width:110vw; }
    .text{ font-size:24px; }
  }
</style>
</head>

<body>
  <div class="table3d"></div>
  <div class="fog"></div>
  <div class="light" id="light"></div>
  <div class="candle"></div>

  <!-- START (BUTONA KADAR DOKUNMADIM) -->
  <div id="startScreen">
    <h1>Kurtarılmayı Bekleyen Prenses</h1>

    <div class="book">
      <div class="cover" id="cover">
        <div class="front"></div>
      </div>
    </div>

    <button onclick="startReading()">Okumaya Başla</button>
  </div>

  <!-- BOOK -->
  <div id="bookContainer">
    <div class="bookStage">

      <div class="page active">
        <div class="imageFrame"><img src="resim1.png" alt="Sayfa 1"></div>
        <div class="text">Masalın ilk satırı burada başlar...</div>
        <button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
      </div>

      <div class="page">
        <div class="imageFrame"><img src="resim2.png" alt="Sayfa 2"></div>
        <div class="text">Aşk uzak diyarlarda yankılandı...</div>
        <button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
      </div>

      <div class="page">
        <div class="imageFrame"><img src="resim3.png" alt="Sayfa 3"></div>
        <div class="text">Kalpler aynı kaderde buluştu...</div>
        <button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
      </div>

      <div class="page">
        <div class="imageFrame"><img src="resim4.png" alt="Sayfa 4"></div>
        <div class="text">Her sayfa yeni bir umut taşıdı...</div>
        <button class="nextBtn" onclick="nextPage()">Sıradaki Sayfa →</button>
      </div>

      <div class="page">
        <div class="imageFrame"><img src="resim5.png" alt="Sayfa 5"></div>
        <div class="text">Masal sonsuza dek sürdü...</div>
        <button class="nextBtn" onclick="finishStory()">Son →</button>
      </div>

    </div>
  </div>

  <div id="finalPopup" onclick="closePopup()">
    <div class="popupInner">
      <div class="popupTitle">❤️ Berat & Evşan ❤️</div>
      <div class="popupText">Bu masalın en güzel kısmı sensin.</div>
    </div>
  </div>

  <audio id="bgMusic" src="evşann.mp3" loop></audio>
  <audio id="paperSound" src="paper.mp3"></audio>

<script>
  let current = 0;
  const pages = document.querySelectorAll('.page');

  function vibrate(ms=40){
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  function startReading(){
    // Butona kadar olan düzen aynı, sadece açılış + geçiş
    document.getElementById('cover').classList.add('open');

    setTimeout(() => {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('bookContainer').style.display = 'flex';

      // Music
      const m = document.getElementById('bgMusic');
      // Bazı tarayıcılarda ses, kullanıcı etkileşiminden sonra serbest — burada butonla tetiklendiği için çalışır
      m.play().catch(()=>{});
    }, 1800);
  }

  function playPaper(){
    const s = document.getElementById('paperSound');
    s.currentTime = 0;
    s.play().catch(()=>{});
  }

  function nextPage(){
    // Guard
    if (current >= pages.length - 1) return;

    playPaper();
    vibrate(35);

    // REAL page flip: current page rotates away
    pages[current].classList.add('turning');

    // After animation, switch pages
    setTimeout(() => {
      pages[current].classList.remove('active');
      // keep turning class to avoid flash; remove after switch
      pages[current].classList.remove('turning');

      current++;
      pages[current].classList.add('active');
    }, 850);
  }

  function finishStory(){
    playPaper();
    vibrate(60);
    document.getElementById('finalPopup').style.display = 'flex';
  }

  function closePopup(){
    document.getElementById('finalPopup').style.display = 'none';
  }

  // mouse light follow
  const light = document.getElementById('light');
  document.addEventListener('mousemove', (e) => {
    light.style.left = e.clientX + 'px';
    light.style.top  = e.clientY + 'px';
  });
</script>

</body>
</html>
