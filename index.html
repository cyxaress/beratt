<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hasta Prensesin Aşık Prensi</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#1a0026;
  --bg2:#000000;
  --purple:#8000ff;
  --magenta:#ff00ff;
}

/* mobil kaydırma için */
html, body{ height:100%; }

body{
  margin:0;
  font-family:'Cinzel',serif;
  background:radial-gradient(circle at center,var(--bg1),var(--bg2));
  overflow:hidden;
}
@media (max-width: 900px){
  body{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
}

/* Fog */
.fog{
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(rgba(255,255,255,0.04),transparent 70%);
  animation:fogMove 40s linear infinite;
  pointer-events:none;
  z-index:1;
}
@keyframes fogMove{
  from{transform:translate(-20%,-20%)}
  to{transform:translate(0,0)}
}

/* Mouse light */
.light{
  position:fixed;
  width:320px;
  height:320px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,rgba(255,0,255,0.25),transparent 70%);
  transform:translate(-50%,-50%);
  z-index:2;
  mix-blend-mode:screen;
}

/* START SCREEN */
#startScreen{
  position:relative;
  z-index:5;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:100vh;
  text-align:center;
  color:white;
  padding:18px;
  box-sizing:border-box;
}
@media (max-width: 900px){
  #startScreen{ height:100svh; }
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:48px;
  margin:0 0 18px 0;
}

/* Kapak görseli (dekor) */
.coverCard{
  width:min(320px, 86vw);
  aspect-ratio:3/4;
  background:url('kapak.png') center/cover no-repeat;
  border-radius:14px;
  box-shadow:0 0 40px rgba(179,0,255,.75);
  border:2px solid rgba(179,0,255,.35);
}

/* Buton */
button{
  margin-top:18px;
  padding:12px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,var(--purple),var(--magenta));
  color:white;
  cursor:pointer;
  box-shadow:0 0 18px rgba(179,0,255,.6);
  touch-action: manipulation;
}

/* VIDEO SCREEN */
#videoScreen{
  position:relative;
  z-index:6;
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  padding:22px 0 40px;
  box-sizing:border-box;
}
@media (max-width: 900px){
  #videoScreen{ min-height:100svh; }
}

/* 16:9 çerçeve */
.videoFrame{
  width:min(92vw, 980px);
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  position:relative;

  /* morumsu çerçeve + glow */
  border:2px solid rgba(179,0,255,.55);
  box-shadow:
    0 0 0 1px rgba(0,0,0,.35) inset,
    0 18px 55px rgba(0,0,0,.65),
    0 0 30px rgba(179,0,255,.25);

  background:rgba(0,0,0,.25);
}

/* Video taşmasın */
.videoFrame video{
  width:100%;
  height:100%;
  object-fit:contain; /* taşma yok */
  background:#000;    /* kenar boşluğu olursa siyah */
  display:block;
}

/* üst köşede küçük bir “glow” şeridi (süs) */
.videoFrame::before{
  content:"";
  position:absolute;
  inset:-60% -20%;
  background:radial-gradient(circle at 30% 30%, rgba(179,0,255,.18), transparent 55%);
  animation:floatGlow 6s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes floatGlow{
  from{ transform:translate(-2%, -2%); opacity:.55; }
  to{ transform:translate(2%, 2%); opacity:.85; }
}

/* Mobilde mouse ışığı yok gibi; parmakla tıklayınca yeter */
@media (max-width: 900px){
  .light{ display:none; }
}
</style>
</head>

<body>
  <div class="fog"></div>
  <div class="light" id="light"></div>

  <!-- Başlangıç -->
  <div id="startScreen">
    <h1>Hasta Prensesin Aşık Prensi</h1>
    <div class="coverCard" aria-hidden="true"></div>
    <button onclick="startVideo()">Okumaya Başla</button>
  </div>

  <!-- Video alanı -->
  <div id="videoScreen">
    <div class="videoFrame">
      <!--
        Not: Mobil tarayıcılar autoplay için genelde "muted" ister.
        Video başlar, kullanıcı isterse ses açar.
      -->
      <video id="mainVideo" src="cyxares.mp4" controls playsinline preload="auto" muted></video>
    </div>
  </div>

<script>
function startVideo(){
  // start ekranını kapat
  document.getElementById('startScreen').style.display = 'none';

  // video ekranını aç
  const vs = document.getElementById('videoScreen');
  vs.style.display = 'flex';

  // video oynat
  const v = document.getElementById('mainVideo');
  v.currentTime = 0;

  // Autoplay dene (iOS için muted already set)
  const p = v.play();
  if (p && typeof p.catch === "function") {
    p.catch(() => {
      // autoplay engellenirse kullanıcı zaten play'e basabilir (controls açık)
    });
  }
}

// mouse light follow (desktop)
const light = document.getElementById('light');
document.addEventListener('mousemove', (e) => {
  if (!light) return;
  light.style.left = e.clientX + 'px';
  light.style.top  = e.clientY + 'px';
});
</script>
</body>
</html>
